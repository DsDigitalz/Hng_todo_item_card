<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Item Card - Testable Component</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <article
      class="todo-card"
      data-testid="test-todo-card"
      role="region"
      aria-label="Todo task"
    >
      <!-- Overdue Indicator (Hidden by default) -->
      <div 
        class="overdue-indicator" 
        data-testid="test-todo-overdue-indicator" 
        id="overdue-banner"
        hidden
      >
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <path d="M6 4v3M6 9h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        <span>Overdue</span>
      </div>

      <!-- Display Mode -->
      <div id="todo-display-mode">
        <!-- Header with checkbox and title -->
        <div class="card-header">
          <div class="checkbox-wrap">
            <input
              type="checkbox"
              id="complete-toggle"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete"
            />
          </div>

          <div class="title-block">
            <h2 data-testid="test-todo-title" id="todo-title">
              Redesign the onboarding flow
            </h2>
            <div class="badges">
              <span
                class="badge"
                data-testid="test-todo-priority test-todo-priority-indicator"
                id="priority-indicator"
              ></span>
              <span
                class="badge"
                data-testid="test-todo-status"
                id="status-badge"
              ></span>
            </div>
          </div>
        </div>

        <!-- Description with Expand/Collapse -->
        <div class="description-section">
          <div 
            class="description-container" 
            id="todo-description-container"
            data-testid="test-todo-collapsible-section"
          >
            <p class="description" data-testid="test-todo-description" id="todo-description-text">
              Update the new-user walkthrough screens to reflect the latest design
              system tokens, improve step clarity, and add contextual tooltips for key
              actions.
            </p>
          </div>
          <button 
            class="expand-toggle" 
            id="expand-toggle" 
            data-testid="test-todo-expand-toggle"
            aria-expanded="false"
            aria-controls="todo-description-container"
            hidden
          >
            Show more
          </button>
        </div>

        <!-- Meta information -->
        <div class="meta">
          <div class="meta-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <b data-testid="test-todo-due-date" id="due-date-display"></b>
          </div>
          <div class="meta-item" style="display: flex; align-items: center; gap: 6px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span data-testid="test-todo-time-remaining" id="time-remaining" aria-live="polite"></span>
          </div>
        </div>

        <!-- Status Control -->
        <div class="status-control-wrap">
          <label for="status-control" class="status-label">Task Status</label>
          <select 
            id="status-control" 
            class="status-select" 
            data-testid="test-todo-status-control"
            aria-label="Change task status"
          >
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
          </select>
        </div>

        <!-- Tags section -->
        <div class="tags-section">
          <ul class="tags-list" data-testid="test-todo-tags" id="todo-tags-list"></ul>
        </div>

        <!-- Action buttons -->
        <div class="actions">
          <button class="action-btn" data-testid="test-todo-edit-button">Edit</button>
          <button class="action-btn danger" data-testid="test-todo-delete-button">Delete</button>
        </div>
      </div>

      <!-- Edit Mode -->
      <form 
        id="todo-edit-mode" 
        data-testid="test-todo-edit-form" 
        style="display: none;"
      >
        <div class="form-group">
          <label for="edit-title">Title</label>
          <input 
            type="text" 
            id="edit-title" 
            data-testid="test-todo-edit-title-input" 
            required
          />
        </div>

        <div class="form-group">
          <label for="edit-description">Description</label>
          <textarea 
            id="edit-description" 
            data-testid="test-todo-edit-description-input" 
            rows="3"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="edit-priority">Priority</label>
            <select id="edit-priority" data-testid="test-todo-edit-priority-select">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-due-date">Due Date</label>
            <input 
              type="datetime-local" 
              id="edit-due-date" 
              data-testid="test-todo-edit-due-date-input"
            />
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" data-testid="test-todo-cancel-button">Cancel</button>
          <button type="submit" class="btn-save" data-testid="test-todo-save-button">Save Changes</button>
        </div>
      </form>
    </article>


    <!-- External JavaScript file -->
    <script src="script.js"></script>
  </body>
</html>
