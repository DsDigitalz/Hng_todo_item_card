<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Item Card - Testable Component</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <article
      class="todo-card"
      data-testid="test-todo-card"
      role="region"
      aria-label="Todo task: Redesign the onboarding flow"
    >
      <!-- Header with checkbox and title -->
      <div class="card-header">
        <div class="checkbox-wrap">
          <label for="complete-toggle" class="sr-only"
            >Mark task as complete</label
          >
          <input
            type="checkbox"
            id="complete-toggle"
            data-testid="test-todo-complete-toggle"
            aria-label="Mark task as complete"
          />
        </div>

        <div class="title-block">
          <h2 data-testid="test-todo-title" id="todo-title">
            Redesign the onboarding flow
          </h2>
          <div class="badges">
            <span
              class="badge badge-priority-high"
              data-testid="test-todo-priority"
              role="status"
              aria-label="Priority: High"
            >
              High priority
            </span>
            <span
              class="badge badge-status inprogress"
              data-testid="test-todo-status"
              id="status-badge"
              role="status"
              aria-label="Status: In Progress"
            >
              In Progress
            </span>
          </div>
        </div>
      </div>

      <!-- Description -->
      <p class="description" data-testid="test-todo-description">
        Update the new-user walkthrough screens to reflect the latest design
        system tokens, improve step clarity, and add contextual tooltips for key
        actions.
      </p>

      <!-- Meta information (due date and time remaining) -->
      <div class="meta">
        <div class="meta-item">
          <svg
            class="meta-icon"
            viewBox="0 0 16 16"
            fill="none"
            aria-hidden="true"
          >
            <rect
              x="2"
              y="3"
              width="12"
              height="11"
              rx="2"
              stroke="currentColor"
              stroke-width="1.2"
            />
            <path
              d="M5 2v2M11 2v2M2 7h12"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
            />
          </svg>
          <time
            data-testid="test-todo-due-date"
            id="due-date-display"
            datetime="2026-05-01T18:00:00Z"
          >
            Due May 1, 2026
          </time>
        </div>
        <div class="meta-item">
          <svg
            class="meta-icon"
            viewBox="0 0 16 16"
            fill="none"
            aria-hidden="true"
          >
            <circle
              cx="8"
              cy="8"
              r="6"
              stroke="currentColor"
              stroke-width="1.2"
            />
            <path
              d="M8 5v3.5l2.5 1.5"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
            />
          </svg>
          <time
            data-testid="test-todo-time-remaining"
            id="time-remaining"
            aria-live="polite"
            datetime="2026-05-01T18:00:00Z"
          ></time>
        </div>
      </div>

      <!-- Tags section -->
      <div class="tags-section">
        <p class="tags-label">Tags</p>
        <ul
          class="tags-list"
          data-testid="test-todo-tags"
          role="list"
          aria-label="Task tags"
        >
          <li>
            <span
              class="tag-chip"
              data-testid="test-todo-tag-work"
              role="listitem"
              >Work</span
            >
          </li>
          <li>
            <span
              class="tag-chip"
              data-testid="test-todo-tag-urgent"
              role="listitem"
              >Urgent</span
            >
          </li>
          <li>
            <span class="tag-chip" role="listitem">Design</span>
          </li>
        </ul>
      </div>

      <!-- Action buttons -->
      <div class="actions">
        <button
          class="action-btn"
          data-testid="test-todo-edit-button"
          aria-label="Edit task"
        >
          <svg
            width="13"
            height="13"
            viewBox="0 0 14 14"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M9.5 1.5l3 3L4 13H1v-3L9.5 1.5z"
              stroke="currentColor"
              stroke-width="1.3"
              stroke-linejoin="round"
            />
          </svg>
          Edit
        </button>
        <button
          class="action-btn danger"
          data-testid="test-todo-delete-button"
          aria-label="Delete task"
        >
          <svg
            width="13"
            height="13"
            viewBox="0 0 14 14"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M2 3.5h10M5.5 3.5V2.5h3v1M6 6v4M8 6v4M3 3.5l.7 8h6.6l.7-8"
              stroke="currentColor"
              stroke-width="1.3"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          Delete
        </button>
      </div>
    </article>

    <!-- External JavaScript file -->
    <script src="script.js"></script>
  </body>
</html>
